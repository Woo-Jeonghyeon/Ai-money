<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3182f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AI 가계부">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>AI 가계부</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --card: #ffffff;
      --ink: #151b28;
      --muted: #768196;
      --line: #e8edf4;
      --blue: #3182f6;
      --blue-soft: #eaf3ff;
      --green: #00a878;
      --red: #ef4e4e;
      --purple: #9b6bff;
      --yellow: #ffb020;
      --shadow: 0 16px 40px rgba(24, 35, 55, 0.08);
      font-family: "Inter", "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    * { box-sizing: border-box; }

    [hidden] { display: none !important; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 0%, rgba(49, 130, 246, 0.12), transparent 28%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 42%);
    }

    button, textarea, input, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    .title-wrap p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .month-picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: var(--shadow);
    }

    .month-picker button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f1f5fb;
      color: #536078;
      font-weight: 800;
    }

    .month-picker input {
      border: 0;
      outline: 0;
      width: 128px;
      color: var(--ink);
      background: transparent;
      font-weight: 700;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(310px, 0.9fr) minmax(0, 1.6fr);
      gap: 18px;
      align-items: start;
    }

    .phone-card,
    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .phone-card {
      padding: 20px;
      position: sticky;
      top: 20px;
    }

    .phone-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    .phone-head strong { font-size: 18px; }
    .phone-head span { color: var(--muted); font-size: 13px; }

    .balance-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .total-balance-card {
      margin-bottom: 18px;
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(135deg, #f1f7ff 0%, #ffffff 72%);
      border: 1px solid #dceaff;
    }

    .total-balance-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .total-balance-card strong {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 900;
    }

    .total-balance-card small {
      display: block;
      margin-top: 6px;
      color: var(--blue);
      font-weight: 800;
    }

    .balance {
      font-size: 34px;
      font-weight: 850;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .balance-sub {
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 22px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .summary-tile {
      padding: 14px;
      border-radius: 18px;
      background: #f7f9fc;
    }

    .summary-tile span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .summary-tile strong {
      font-size: 18px;
      line-height: 1.15;
    }

    .input-box {
      display: grid;
      gap: 10px;
      padding-top: 6px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      color: var(--ink);
      background: #fff;
      line-height: 1.55;
      outline: none;
    }

    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.12);
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .type-select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .primary-btn {
      min-height: 46px;
      border-radius: 14px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      padding: 0 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #4d5a70;
      padding: 8px 11px;
      font-size: 13px;
      font-weight: 700;
    }

    .content {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 18px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .quiet-btn {
      min-height: 36px;
      border-radius: 12px;
      background: #f1f5fb;
      color: #536078;
      padding: 0 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .export-actions {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .month-visuals {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 270px;
      gap: 14px;
      align-items: stretch;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding-bottom: 2px;
    }

    .day {
      min-height: 62px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 8px;
      display: grid;
      align-content: start;
      gap: 5px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .day:hover {
      border-color: var(--blue);
      box-shadow: 0 8px 22px rgba(49, 130, 246, 0.13);
    }

    .day.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
      box-shadow: none;
    }

    .day strong {
      font-size: 12px;
      color: #5c6678;
    }

    .day span {
      font-size: 11px;
      color: var(--blue);
      font-weight: 800;
      word-break: keep-all;
    }

    .bars {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .bar-row {
      display: grid;
      gap: 6px;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #536078;
      font-size: 13px;
      font-weight: 800;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #eef3f9;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--blue);
    }

    .insights {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .insight {
      min-height: 76px;
      border-radius: 18px;
      background: #f7f9fc;
      padding: 14px;
      border-left: 4px solid var(--blue);
      color: #334055;
      line-height: 1.4;
      font-weight: 700;
    }

    .ledger-list {
      display: grid;
      gap: 8px;
    }

    .ledger-pager {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .page-token {
      min-height: 30px;
      min-width: 34px;
      border-radius: 999px;
      background: #f1f5fb;
      color: #536078;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .page-token:disabled {
      opacity: 0.42;
      cursor: default;
    }

    .page-token.current {
      background: var(--blue);
      color: #fff;
    }

    .entry {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
    }

    .entry.detail-link {
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .entry.detail-link:hover {
      border-color: #9ac1ff;
      box-shadow: 0 8px 22px rgba(49, 130, 246, 0.12);
      transform: translateY(-1px);
    }

    .entry.target-highlight {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.16);
    }

    .entry-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
    }

    .entry-main {
      min-width: 0;
    }

    .entry-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      margin-bottom: 4px;
    }

    .entry-title strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .entry-sub {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-amount {
      text-align: right;
      font-weight: 900;
      white-space: nowrap;
    }

    .entry-amount.income { color: var(--blue); }

    .entry-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 7px;
    }

    .mini-btn {
      min-height: 28px;
      border-radius: 10px;
      padding: 0 9px;
      background: #f1f5fb;
      color: #536078;
      font-size: 12px;
      font-weight: 800;
    }

    .mini-btn.danger {
      background: #fff0f0;
      color: var(--red);
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 18px;
    }

    canvas {
      width: 100%;
      height: auto;
      cursor: zoom-in;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fff;
      display: block;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translate(-50%, 10px);
      max-width: min(420px, calc(100% - 32px));
      background: #222b3a;
      color: #fff;
      padding: 12px 15px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      width: 100%;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      background: rgba(21, 27, 40, 0.58);
      overflow: hidden;
    }

    .modal[hidden] { display: none; }

    .modal-content {
      width: min(980px, 100%);
      max-width: 100%;
      max-height: calc(100dvh - 24px);
      margin: auto;
      overflow: hidden;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.28);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 17px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f1f5fb;
      color: #536078;
      font-size: 22px;
    }

    .chart-preview {
      display: block;
      width: 100%;
      max-height: calc(100dvh - 94px);
      object-fit: contain;
      padding: 16px;
      background: #fff;
    }

    .day-detail {
      display: grid;
      gap: 10px;
      max-height: calc(100dvh - 94px);
      overflow: auto;
      overscroll-behavior: contain;
      padding: 16px;
      background: #f7f9fc;
    }

    .day-total {
      padding: 14px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .day-chart-card {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
    }

    .day-pie {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #eef3f9;
    }

    .day-legend {
      display: grid;
      gap: 8px;
    }

    .legend-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #536078;
      font-size: 13px;
      font-weight: 800;
    }

    .legend-name {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    @media (max-width: 980px) {
      .hero,
      .month-visuals {
        grid-template-columns: 1fr;
      }

      .phone-card {
        position: static;
      }

      .insights {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 440px);
        padding-top: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .title-wrap h1 {
        font-size: 22px;
      }

      .summary-grid,
      .input-row {
        grid-template-columns: 1fr;
      }

      .panel,
      .phone-card {
        border-radius: 20px;
      }

      .calendar {
        gap: 5px;
      }

      .day {
        min-height: 52px;
        padding: 6px;
        border-radius: 12px;
      }

      .entry {
        grid-template-columns: 38px minmax(0, 1fr);
      }

      .entry-amount {
        grid-column: 2;
        text-align: left;
      }

      .modal {
        place-items: center;
        padding:
          max(8px, env(safe-area-inset-top))
          max(8px, env(safe-area-inset-right))
          max(8px, env(safe-area-inset-bottom))
          max(8px, env(safe-area-inset-left));
      }

      .modal-content {
        width: 100%;
        max-height: calc(100dvh - 16px);
        border-radius: 18px;
      }

      .modal-head {
        padding: 12px 14px;
      }

      .day-detail {
        max-height: calc(100dvh - 78px);
        padding: 10px;
      }

      .chart-preview {
        max-height: calc(100dvh - 78px);
        padding: 8px;
      }

      .day-chart-card {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .day-legend {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-wrap">
        <h1 id="pageTitle">6월 내 소비</h1>
        <p id="monthSummary">입력하면 AI가 날짜, 금액, 분류를 자동으로 정리합니다.</p>
      </div>
      <div class="month-picker">
        <button id="prevMonth" title="이전 달">‹</button>
        <input id="monthFilter" type="month" aria-label="조회 월">
        <button id="nextMonth" title="다음 달">›</button>
      </div>
    </header>

    <section class="hero">
      <aside class="phone-card">
        <div class="phone-head">
          <div>
            <strong>AI 가계부</strong>
            <span>자동 분류 모드</span>
          </div>
          <div class="export-actions">
            <button class="quiet-btn" id="restoreBtn">복구</button>
            <button class="quiet-btn" id="exportJsonBtn">백업</button>
            <button class="quiet-btn" id="importJsonBtn">불러오기</button>
            <input id="importJsonInput" type="file" accept="application/json,.json" hidden>
            <button class="quiet-btn" id="exportTextBtn">TXT</button>
            <button class="quiet-btn" id="exportBtn">CSV</button>
          </div>
        </div>

        <div class="total-balance-card">
          <span>총 잔액</span>
          <strong id="totalBalance">0원</strong>
          <small id="totalBalanceNote">전체 수입 - 전체 지출</small>
        </div>

        <div class="balance-label">이번 달 소비/수입</div>
        <div class="balance" id="netBalance">0원</div>
        <div class="balance-sub" id="remainingLabel">0원 남음</div>

        <div class="summary-grid">
          <div class="summary-tile">
            <span>총 지출</span>
            <strong id="totalSpent">0원</strong>
          </div>
          <div class="summary-tile">
            <span>월 수입(예산)</span>
            <strong id="budgetLabel">0원</strong>
          </div>
          <div class="summary-tile">
            <span>가장 큰 분류</span>
            <strong id="topCategory">-</strong>
          </div>
          <div class="summary-tile">
            <span>하루 평균</span>
            <strong id="dailyAverage">0원</strong>
          </div>
        </div>

        <div class="input-box">
          <textarea id="naturalInput" placeholder="예:
오늘 점심 한식뷔페 12000원
어제 버스 1500원
6/1 월세 500000원
오늘 월급 250만원"></textarea>
          <div class="input-row">
            <select class="type-select" id="defaultType" aria-label="기본 유형">
              <option value="expense">기본: 지출</option>
              <option value="income">기본: 수입</option>
            </select>
            <button class="primary-btn" id="parseBtn">내역 추가</button>
          </div>
          <input id="incomeBudgetPreview" type="hidden">
          <div class="chips">
            <button class="chip" data-sample="오늘 점심 12000원">오늘 점심</button>
            <button class="chip" data-sample="어제 버스 1500원">교통</button>
            <button class="chip" data-sample="6/1 월세 500000원">월세</button>
            <button class="chip" data-sample="오늘 월급 250만원">수입</button>
          </div>
        </div>
      </aside>

      <div class="content">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>월별 한눈에 보기</h2>
              <p>날짜별 지출과 분류별 비중을 그래프로 확인하세요.</p>
            </div>
            <button class="quiet-btn" id="clearBtn">초기화</button>
          </div>

          <div class="month-visuals">
            <div>
              <div class="calendar" id="calendar"></div>
            </div>
            <div class="bars" id="categoryBars"></div>
          </div>

          <div class="insights" id="insights"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>그래프</h2>
              <p>누르면 크게 볼 수 있습니다.</p>
            </div>
          </div>
          <div class="month-visuals">
            <canvas id="dailyChart" width="720" height="320" aria-label="날짜별 지출 그래프"></canvas>
            <canvas id="categoryChart" width="520" height="320" aria-label="카테고리 지출 그래프"></canvas>

        <section class="panel" id="recentLedgerSection">
          <div class="panel-head">
            <div>
              <h2>최근 내역</h2>
              <p>분류는 AI가 자동 판단합니다. 필요할 때만 재분류할 수 있어요.</p>
            </div>
            <div class="ledger-pager">
              <span class="badge" id="totalCount">0건</span>
              <button class="page-token" id="prevLedgerPage" title="이전 내역">‹</button>
              <span class="page-token current" id="ledgerPageLabel">1</span>

          <div id="emptyState" class="empty">아직 내역이 없습니다. 왼쪽 입력창에 적어보세요.</div>

    </section>
  </main>

  <div class="modal" id="chartModal" hidden>
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="chartModalTitle">
      <div class="modal-head">
        <h3 id="chartModalTitle">그래프 확대</h3>
        <button class="icon-btn" id="closeChartModal" title="닫기">×</button>
      </div>
      <img class="chart-preview" id="chartPreview" alt="확대된 그래프">
      <div class="day-detail" id="dayDetail" hidden></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "ai-budget-book-v2";
    const OLD_STORAGE_KEY = "ai-budget-book-v1";
    const BACKUP_STORAGE_KEY = "ai-budget-book-backup-before-clear";

    const categories = [
      { name: "군것질", icon: "🍬", color: "#ec4899", words: ["새콤달콤", "과자", "젤리", "사탕", "초콜릿", "초코", "아이스크림", "군것질", "간식", "빼빼로", "홈런볼", "꼬깔콘", "포카칩", "허니버터칩", "마이쮸", "멘토스", "껌"] },
      { name: "식비", icon: "🍽", color: "#f97316", words: ["점심", "저녁", "아침", "밥", "식당", "뷔페", "카페", "커피", "편의점", "마트", "배달", "치킨", "피자", "음식", "버거", "분식", "라면", "한식", "망고", "모찌", "과일", "딸기", "바나나", "사과", "귤", "포도", "수박", "복숭아", "떡", "찹쌀떡"] },
      { name: "교통", icon: "🚌", color: "#2563eb", words: ["버스", "지하철", "택시", "기차", "주유", "톨비", "교통", "주차", "카카오택시", "따릉이", "출근", "퇴근", "통근", "이동", "씽씽", "킥보드", "전동킥보드", "자전거", "대리", "고속버스", "시외버스", "카드갑", "카드값", "카드 값"] },
      { name: "출장", icon: "🧳", color: "#7c3aed", words: ["출장", "출장숙소", "출장숙소예약", "출장비", "업무출장", "출장신청"] },
      { name: "주거", icon: "🏠", color: "#a855f7", words: ["월세", "전세", "관리비", "전기", "가스", "수도", "인터넷", "통신비", "집세", "숙소", "숙박", "호텔", "모텔", "게스트하우스", "펜션", "여관"] },
      { name: "시설", icon: "🏢", color: "#06b6d4", words: ["기숙사", "기숙사비", "시설", "시설비", "시설사용료", "이용료", "센터", "회관", "사물함", "독서실", "스터디룸"] },
      { name: "단명", icon: "⚡", color: "#ef4444", words: ["에너지드링크", "에너지 드링크", "핫식스", "몬스터", "레드불", "박카스", "카페인"] },
      { name: "생활비", icon: "🧹", color: "#22c55e", words: ["화장실청소도구", "청소도구", "청소용품", "생활용품", "세제", "휴지", "물티슈", "쓰레기봉투", "샴푸", "바디워시", "칫솔", "치약"] },
      { name: "운동", icon: "💪", color: "#84cc16", words: ["프로틴", "단백질", "헬스", "운동", "헬스장", "pt", "피티", "보충제", "크레아틴", "닭가슴살"] },
      { name: "연인", icon: "💗", color: "#db2777", words: ["여친", "남친", "애인", "연인", "데이트", "커플", "기념일"] },
      { name: "구독", icon: "🔁", color: "#0f766e", words: ["구독", "구독료", "gpt", "chatgpt", "chat gpt", "openai", "클로드", "claude", "제미나이", "gemini", "코파일럿", "copilot", "퍼플렉시티", "perplexity", "ai 구독"] },
      { name: "쇼핑", icon: "🛍", color: "#f59e0b", words: ["옷", "신발", "쿠팡", "쇼핑", "화장품", "문구", "가전", "다이소", "무신사", "올리브영"] },
      { name: "여가", icon: "🎬", color: "#eab308", words: ["영화", "게임", "술", "노래방", "여행", "공연", "취미", "넷플릭스", "유튜브"] },
      { name: "의료", icon: "💊", color: "#10b981", words: ["병원", "약국", "약", "치과", "의료", "검진"] },
      { name: "교육", icon: "📚", color: "#64748b", words: ["책", "강의", "학원", "수업", "교육", "인강"] },
      { name: "수입", icon: "₩", color: "#0ea5e9", words: ["월급", "급여", "알바", "입금", "용돈", "수입", "환급", "상여", "보너스", "이자"] },
      { name: "기타", icon: "•", color: "#94a3b8", words: [] }
    ];

    const state = {
      entries: normalizeLoadedEntries(loadEntries()),
      month: toMonthValue(new Date()),
      ledgerPage: 0
    };

    const els = {
      pageTitle: document.getElementById("pageTitle"),
      naturalInput: document.getElementById("naturalInput"),
      parseBtn: document.getElementById("parseBtn"),
      incomeBudgetPreview: document.getElementById("incomeBudgetPreview"),
      monthFilter: document.getElementById("monthFilter"),
      prevMonth: document.getElementById("prevMonth"),
      nextMonth: document.getElementById("nextMonth"),
      defaultType: document.getElementById("defaultType"),
      ledgerBody: document.getElementById("ledgerBody"),
      prevLedgerPage: document.getElementById("prevLedgerPage"),
      nextLedgerPage: document.getElementById("nextLedgerPage"),
      ledgerPageLabel: document.getElementById("ledgerPageLabel"),
      emptyState: document.getElementById("emptyState"),
      tableWrap: document.getElementById("tableWrap"),
      totalSpent: document.getElementById("totalSpent"),
      totalCount: document.getElementById("totalCount"),
      budgetLabel: document.getElementById("budgetLabel"),
      totalBalance: document.getElementById("totalBalance"),
      totalBalanceNote: document.getElementById("totalBalanceNote"),
      remainingLabel: document.getElementById("remainingLabel"),
      topCategory: document.getElementById("topCategory"),
      dailyAverage: document.getElementById("dailyAverage"),
      netBalance: document.getElementById("netBalance"),
      monthSummary: document.getElementById("monthSummary"),
      calendar: document.getElementById("calendar"),
      categoryBars: document.getElementById("categoryBars"),
      dailyChart: document.getElementById("dailyChart"),
      categoryChart: document.getElementById("categoryChart"),
      chartModal: document.getElementById("chartModal"),
      chartModalTitle: document.getElementById("chartModalTitle"),
      chartPreview: document.getElementById("chartPreview"),
      dayDetail: document.getElementById("dayDetail"),
      closeChartModal: document.getElementById("closeChartModal"),
      insights: document.getElementById("insights"),
      exportBtn: document.getElementById("exportBtn"),
      exportTextBtn: document.getElementById("exportTextBtn"),
      exportJsonBtn: document.getElementById("exportJsonBtn"),
      importJsonBtn: document.getElementById("importJsonBtn"),
      importJsonInput: document.getElementById("importJsonInput"),
      restoreBtn: document.getElementById("restoreBtn"),
      clearBtn: document.getElementById("clearBtn"),
      toast: document.getElementById("toast")
    };

    els.monthFilter.value = state.month;
    // Keep deployed copies empty until the user adds their own entries.
    render();

    els.parseBtn.addEventListener("click", addNaturalEntries);
    els.dailyChart.addEventListener("click", () => openChartModal(els.dailyChart, "날짜별 지출"));
    els.categoryChart.addEventListener("click", () => openChartModal(els.categoryChart, "카테고리 분포"));
    els.closeChartModal.addEventListener("click", closeChartModal);
    els.chartModal.addEventListener("click", (event) => {
      if (event.target === els.chartModal) closeChartModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !els.chartModal.hidden) closeChartModal();
    });
    els.monthFilter.addEventListener("input", () => {
      state.month = els.monthFilter.value || toMonthValue(new Date());
      state.ledgerPage = 0;
      render();
    });
    els.prevMonth.addEventListener("click", () => shiftMonth(-1));
    els.nextMonth.addEventListener("click", () => shiftMonth(1));
    els.prevLedgerPage.addEventListener("click", () => {
      state.ledgerPage = Math.max(0, state.ledgerPage - 1);
      render();
    });
    els.nextLedgerPage.addEventListener("click", () => {
      state.ledgerPage += 1;
      render();
    });
    els.exportBtn.addEventListener("click", exportCsv);
    els.exportTextBtn.addEventListener("click", exportText);
    els.exportJsonBtn.addEventListener("click", exportJsonBackup);
    els.importJsonBtn.addEventListener("click", () => els.importJsonInput.click());
    els.importJsonInput.addEventListener("change", importJsonBackup);
    els.restoreBtn.addEventListener("click", restoreSavedEntries);
    els.clearBtn.addEventListener("click", () => {
      if (!confirm("모든 가계부 내역을 삭제할까요?")) return;
      backupCurrentStorageBeforeClear();
      state.entries = [];
      state.ledgerPage = 0;
      persist();
      render();
      showToast("내역을 모두 비웠습니다.");
    });

    document.querySelectorAll("[data-sample]").forEach((button) => {
      button.addEventListener("click", () => {
        const current = els.naturalInput.value.trim();
        els.naturalInput.value = current ? `${current}\n${button.dataset.sample}` : button.dataset.sample;
        els.naturalInput.focus();
      });
    });

    function addNaturalEntries() {
      const lines = els.naturalInput.value.split(/\n+/).map((line) => line.trim()).filter(Boolean);
      if (!lines.length) {
        showToast("먼저 내역을 한 줄 이상 입력해 주세요.");
        return;
      }

      const parsed = lines.map(parseLine).filter(Boolean);
      if (!parsed.length) {
        showToast("금액을 찾지 못했습니다. 예: 오늘 점심 12000원");
        return;
      }

      state.entries = [...parsed, ...state.entries].sort((a, b) => b.date.localeCompare(a.date));
      state.ledgerPage = 0;
      els.naturalInput.value = "";
      persist();
      render();
      showToast(`${parsed.length}건을 AI가 자동 분류했습니다.`);
    }

    function parseLine(line) {
      const amount = extractAmount(line);
      if (!amount) return null;
      const date = extractDate(line);
      const type = inferType(line);
      const category = type === "income" ? "수입" : inferCategory(line);

      return {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        date,
        title: cleanTitle(line),
        category,
        type,
        amount,
        raw: line,
        auto: true
      };
    }

    function extractAmount(line) {
      const normalized = line.replace(/,/g, "");
      const tokens = normalized.match(/(\d+(?:\.\d+)?)\s*(만원|천원|원)?/g) || [];
      let best = 0;
      tokens.forEach((token) => {
        const match = token.match(/(\d+(?:\.\d+)?)\s*(만원|천원|원)?/);
        if (!match) return;
        let value = Number(match[1]);
        if (match[2] === "만원") value *= 10000;
        if (match[2] === "천원") value *= 1000;
        if (value > best) best = value;
      });
      return Math.round(best);
    }

    function extractDate(line) {
      const now = new Date();
      const date = new Date(now);
      if (/그제|그저께/.test(line)) date.setDate(date.getDate() - 2);
      else if (/어제/.test(line)) date.setDate(date.getDate() - 1);
      else if (/내일/.test(line)) date.setDate(date.getDate() + 1);
      applyWeekdayHint(line, date);

      const fullDate = line.match(/(20\d{2})[./-](\d{1,2})[./-](\d{1,2})/);
      const monthDay = line.match(/(\d{1,2})[./-](\d{1,2})/);
      if (fullDate) date.setFullYear(Number(fullDate[1]), Number(fullDate[2]) - 1, Number(fullDate[3]));
      else if (monthDay) date.setMonth(Number(monthDay[1]) - 1, Number(monthDay[2]));
      return toDateValue(date);
    }

    function inferType(line) {
      if (/월급|급여|수입|입금|환급|용돈|알바|상여|보너스|이자/.test(line)) return "income";
      if (/지출|결제|구매|냄|냈|샀|사용|출금|이체/.test(line)) return "expense";
      return els.defaultType.value;
    }

    function inferCategory(line) {
      const text = line.toLowerCase();
      if (/출장|출장숙소|출장숙소예약|출장비|업무출장|출장신청/.test(text)) return "출장";
      if (/숙소|숙박|출장숙소|호텔|모텔|게스트하우스|펜션|여관/.test(text)) return "주거";
      if (/망고|모찌|과일|딸기|바나나|사과|귤|포도|수박|복숭아|떡|찹쌀떡/.test(text)) return "식비";
      if (/새콤달콤|과자|젤리|사탕|초콜릿|초코|아이스크림|군것질|간식|빼빼로|홈런볼|꼬깔콘|포카칩|허니버터칩|마이쮸|멘토스|껌/.test(text)) return "군것질";
      if (/기숙사|기숙사비|시설비|시설사용료|사물함|스터디룸/.test(text)) return "시설";
      if (/에너지\s*드링크|에너지드링크|핫식스|몬스터|레드불|박카스|카페인/.test(text)) return "단명";
      if (/화장실청소도구|청소도구|청소용품|생활용품|세제|휴지|물티슈|쓰레기봉투|샴푸|바디워시|칫솔|치약/.test(text)) return "생활비";
      if (/gpt|chat\s*gpt|openai|클로드|claude|제미나이|gemini|코파일럿|copilot|퍼플렉시티|perplexity|ai\s*구독|구독료/.test(text)) return "구독";
      if (/프로틴|단백질|헬스장?|운동|\bpt\b|피티|보충제|크레아틴|닭가슴살/.test(text)) return "운동";
      if (/여친|남친|애인|연인|데이트|커플|기념일/.test(text)) return "연인";
      if (/카드\s*[갑값]/.test(text)) return "교통";
      let best = { name: "기타", score: 0 };
      categories.filter((category) => category.name !== "수입" && category.name !== "기타").forEach((category) => {
        let score = 0;
        category.words.forEach((word) => {
          if (text.includes(word.toLowerCase())) score += word.length > 2 ? 3 : 2;
        });
        if (score > best.score) best = { name: category.name, score };
      });

      if (best.score) return best.name;
      if (/출근|퇴근|통근|씽씽|킥보드|전동킥보드|따릉이|이동/.test(text)) return "교통";
      if (/[0-9]+\s*원/.test(text) && /네이버|카카오|토스|페이|카드/.test(text)) return "쇼핑";
      return "기타";
    }

    function cleanTitle(line) {
      return line
        .replace(/(20\d{2})[./-]\d{1,2}[./-]\d{1,2}/g, "")
        .replace(/\d{1,2}[./-]\d{1,2}/g, "")
        .replace(/오늘|어제|그제|그저께|내일|지난주|이번주/g, "")
        .replace(/\d+(?:,\d{3})*(?:\.\d+)?\s*(만원|천원|원)?/g, "")
        .replace(/지출|결제|구매|사용|냄|냈|샀/g, "")
        .trim() || "미분류 내역";
    }

    function render() {
      applyForcedCategoryCorrections();
      const monthEntries = getMonthEntries();
      const expenses = monthEntries.filter((entry) => entry.type === "expense");
      const income = monthEntries.filter((entry) => entry.type === "income").reduce((sum, entry) => sum + entry.amount, 0);
      const allIncome = state.entries.filter((entry) => entry.type === "income").reduce((sum, entry) => sum + entry.amount, 0);
      const allExpense = state.entries.filter((entry) => entry.type === "expense").reduce((sum, entry) => sum + entry.amount, 0);
      const totalBalance = allIncome - allExpense;
      const budgetSource = getBudgetSource(income);
      const budget = budgetSource.amount;
      const total = expenses.reduce((sum, entry) => sum + entry.amount, 0);
      const remaining = budget - total;
      const categoryTotals = groupByCategory(expenses);
      const top = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1])[0];
      const daysWithEntries = new Set(expenses.map((entry) => entry.date)).size || 1;
      const dailyAverage = Math.round(total / daysWithEntries);
      const monthLabel = formatMonthLabel(state.month);

      els.pageTitle.textContent = `${monthLabel} 내 소비`;
      els.totalSpent.textContent = formatWon(total);
      els.totalCount.textContent = `${monthEntries.length}건`;
      els.budgetLabel.textContent = formatWon(budget);
      els.totalBalance.textContent = formatSigned(totalBalance);
      els.totalBalance.style.color = totalBalance < 0 ? "var(--red)" : "var(--blue)";
      els.totalBalanceNote.textContent = `수입 ${formatWon(allIncome)} · 지출 ${formatWon(allExpense)}`;
      els.incomeBudgetPreview.value = budgetSource.label;
      els.remainingLabel.textContent = `${formatWon(remaining)} 남음`;
      els.remainingLabel.style.color = remaining < 0 ? "var(--red)" : "var(--blue)";
      els.netBalance.textContent = formatSigned(income - total);
      els.netBalance.style.color = income - total < 0 ? "var(--ink)" : "var(--blue)";
      els.topCategory.textContent = top ? top[0] : "-";
      els.dailyAverage.textContent = formatWon(dailyAverage);
      els.monthSummary.textContent = budgetSource.kind === "previous"
        ? `${budgetSource.month} 수입을 이어받아 이번 달 예산으로 계산 중입니다.`
        : `${monthEntries.length}건을 분석했고, 분류는 자동으로 판단합니다.`;

      renderCalendar(expenses);
      renderCategoryBars(categoryTotals, total);
      renderLedger(monthEntries);
      renderInsights(monthEntries, expenses, total, budgetSource, remaining, top);
      drawDailyChart(expenses);
      drawCategoryChart(categoryTotals);
    }

    function applyForcedCategoryCorrections() {
      let changed = false;
      state.entries.forEach((entry) => {
        if (entry.type === "income") return;
        const text = `${entry.raw || ""} ${entry.title || ""}`.toLowerCase();
        if (!hasForcedCategory(text)) return;
        const next = inferCategory(text);
        if (next !== entry.category) {
          entry.category = next;
          entry.auto = true;
          changed = true;
        }
      });
      if (changed) persist();
    }

    function hasForcedCategory(text) {
      return /카드\s*[갑값]|gpt|chat\s*gpt|openai|클로드|claude|제미나이|gemini|코파일럿|copilot|퍼플렉시티|perplexity|ai\s*구독|구독료|출장|출장숙소|출장숙소예약|출장비|업무출장|출장신청|망고|모찌|과일|딸기|바나나|사과|귤|포도|수박|복숭아|찹쌀떡|화장실청소도구|청소도구|청소용품|생활용품|프로틴|단백질|헬스장?|여친|남친|애인|연인|데이트|커플|기념일/.test(text);
    }

    function renderCalendar(expenses) {
      const [year, month] = state.month.split("-").map(Number);
      const firstDay = new Date(year, month - 1, 1).getDay();
      const days = daysInMonth(state.month);
      const daily = groupByDay(expenses);
      const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
      const cells = weekdays.map((day) => `<div class="weekday">${day}</div>`);
      for (let i = 0; i < firstDay; i++) cells.push('<div class="day empty"></div>');
      for (let day = 1; day <= days; day++) {
        const value = daily[day] || 0;
        cells.push(`<button class="day" data-day="${day}" title="${day}일 상세 보기"><strong>${day}</strong>${value ? `<span>${shortWon(value)}</span>` : ""}</button>`);
      }
      els.calendar.innerHTML = cells.join("");
      els.calendar.querySelectorAll("[data-day]").forEach((button) => {
        button.addEventListener("click", () => openDayDetail(Number(button.dataset.day)));
      });
    }

    function renderCategoryBars(categoryTotals, total) {
      const rows = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);
      if (!rows.length) {
        els.categoryBars.innerHTML = '<div class="empty">분류 그래프는 지출을 입력하면 표시됩니다.</div>';
        return;
      }
      els.categoryBars.innerHTML = rows.map(([name, value]) => {
        const category = getCategory(name);
        const pct = Math.round(value / Math.max(total, 1) * 100);
        return `
          <div class="bar-row">
            <div class="bar-meta"><span>${category.icon} ${name}</span><span>${formatWon(value)}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${category.color}"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderLedger(entries) {
      const pageSize = 10;
      const totalPages = Math.max(1, Math.ceil(entries.length / pageSize));
      state.ledgerPage = Math.min(state.ledgerPage, totalPages - 1);
      const start = state.ledgerPage * pageSize;
      const pageEntries = entries.slice(start, start + pageSize);

      els.emptyState.hidden = entries.length > 0;
      els.ledgerBody.innerHTML = "";
      els.prevLedgerPage.disabled = state.ledgerPage === 0;
      els.nextLedgerPage.disabled = state.ledgerPage >= totalPages - 1;
      els.ledgerPageLabel.textContent = `${state.ledgerPage + 1}/${totalPages}`;

      pageEntries.forEach((entry) => {
        const category = getCategory(entry.category);
        const row = document.createElement("div");
        row.className = "entry";
        row.dataset.entryId = String(entry.id);
        row.innerHTML = `
          <div class="entry-icon" style="background:${category.color}">${category.icon}</div>
          <div class="entry-main">
            <div class="entry-title">
              <strong>${escapeHtml(entry.title)}</strong>
              <span class="badge">AI ${escapeHtml(entry.category)}</span>
            </div>
            <div class="entry-sub">${entry.date} · ${escapeHtml(entry.raw)}</div>
            <div class="entry-actions">
              <button class="mini-btn" data-reclassify>재분류</button>
              <button class="mini-btn danger" data-delete>삭제</button>
            </div>
          </div>
          <div class="entry-amount ${entry.type === "income" ? "income" : ""}">${entry.type === "income" ? "+" : "-"}${formatWon(entry.amount)}</div>
        `;
        row.querySelector("[data-delete]").addEventListener("click", () => {
          state.entries = state.entries.filter((item) => item.id !== entry.id);
          persist();
          render();
        });
        row.querySelector("[data-reclassify]").addEventListener("click", () => {
          const next = inferCategory(`${entry.raw} ${entry.title}`);
          entry.category = entry.type === "income" ? "수입" : next;
          entry.auto = true;
          persist();
          render();
          showToast(`${entry.title}을 ${entry.category}(으)로 분류했습니다.`);
        });
        els.ledgerBody.appendChild(row);
      });
    }

    function renderInsights(monthEntries, expenses, total, budgetSource, remaining, top) {
      const insights = [];
      if (!monthEntries.length) {
        insights.push("내역을 입력하면 월 소비 요약이 나옵니다.");
      } else {
        insights.push(budgetSource.amount ? `예산의 ${Math.round(total / budgetSource.amount * 100)}% 사용` : `총 지출 ${formatWon(total)}`);
        if (top) insights.push(`가장 큰 분류는 ${top[0]}입니다.`);
        insights.push(remaining < 0 ? `예산 초과 ${formatWon(Math.abs(remaining))}` : `잔액 ${formatWon(remaining)}`);
      }
      els.insights.innerHTML = insights.map((text) => `<div class="insight">${text}</div>`).join("");
    }

    function drawDailyChart(expenses) {
      const canvas = els.dailyChart;
      const ctx = canvas.getContext("2d");
      clearCanvas(ctx, canvas);
      const daily = groupByDay(expenses);
      const days = daysInMonth(state.month);
      const values = Array.from({ length: days }, (_, i) => daily[i + 1] || 0);
      const max = Math.max(...values, 1);
      const pad = 72;
      const width = canvas.width - pad * 2;
      const chartTop = 78;
      const axisY = canvas.height - 54;
      const height = axisY - chartTop;
      drawYAxisLabels(ctx, canvas, pad, chartTop, axisY, max);
      drawAxis(ctx, canvas, pad);
      values.forEach((value, index) => {
        const barWidth = Math.max(5, width / days - 4);
        const x = pad + index * (width / days) + 1;
        const barHeight = value / max * height;
        const y = axisY - barHeight;
        ctx.fillStyle = "#3182f6";
        roundRect(ctx, x, y, barWidth, barHeight, 5);
        ctx.fill();
        if (value > 0) drawBarAmount(ctx, x + barWidth / 2, y, chartTop, formatWon(value));
      });
      drawDayLabels(ctx, days, width, pad, axisY);
      ctx.fillStyle = "#151b28";
      ctx.font = "900 28px Segoe UI";
      ctx.fillText(`${formatMonthLabel(state.month)} 날짜별 지출`, pad, 34);
      ctx.fillStyle = "#768196";
      ctx.font = "13px Segoe UI";
      ctx.fillText(`최대 ${formatWon(max)} · 막대 아래 숫자는 날짜`, pad, 58);
    }

    function drawBarAmount(ctx, centerX, barTop, chartTop, label) {
      const insideBar = barTop < chartTop + 54;
      ctx.save();
      ctx.translate(centerX, insideBar ? barTop + 8 : barTop - 5);
      ctx.rotate(insideBar ? Math.PI / 2 : -Math.PI / 2);
      ctx.fillStyle = insideBar ? "#ffffff" : "#334055";
      ctx.font = "800 10px Segoe UI";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(label, 0, 0);
      ctx.restore();
    }

    function drawCategoryChart(categoryTotals) {
      const canvas = els.categoryChart;
      const ctx = canvas.getContext("2d");
      clearCanvas(ctx, canvas);
      const data = Object.entries(categoryTotals).filter(([, value]) => value > 0);
      const total = data.reduce((sum, [, value]) => sum + value, 0);
      ctx.fillStyle = "#536078";
      ctx.font = "700 17px Segoe UI";
      ctx.fillText("카테고리 분포", 28, 30);
      if (!total) {
        ctx.font = "14px Segoe UI";
        ctx.fillText("표시할 지출이 없습니다.", 28, 76);
        return;
      }

      let angle = -Math.PI / 2;
      const cx = 145;
      const cy = 178;
      const radius = 86;
      data.forEach(([name, value]) => {
        const category = getCategory(name);
        const slice = value / total * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, angle, angle + slice);
        ctx.closePath();
        ctx.fillStyle = category.color;
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();
        angle += slice;
      });

      data.slice(0, 6).forEach(([name, value], index) => {
        const category = getCategory(name);
        const x = 270;
        const y = 82 + index * 30;
        ctx.fillStyle = category.color;
        ctx.fillRect(x, y - 11, 13, 13);
        ctx.fillStyle = "#334055";
        ctx.font = "13px Segoe UI";
        ctx.fillText(`${name} ${formatWon(value)}`, x + 22, y);
      });
    }

    function drawAxis(ctx, canvas, pad) {
      ctx.strokeStyle = "#e8edf4";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad, canvas.height - 54);
      ctx.lineTo(canvas.width - pad, canvas.height - 54);
      ctx.stroke();
    }

    function drawYAxisLabels(ctx, canvas, pad, chartTop, axisY, max) {
      const ticks = [max, max / 2, 0];
      ctx.textAlign = "right";
      ctx.font = "11px Segoe UI";
      ticks.forEach((value) => {
        const y = value === 0 ? axisY : axisY - (value / max) * (axisY - chartTop);
        ctx.strokeStyle = "#f0f3f8";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(canvas.width - pad, y);
        ctx.stroke();
        ctx.fillStyle = "#768196";
        ctx.fillText(shortWon(value), pad - 8, y + 4);
      });
      ctx.textAlign = "left";
    }

    function drawDayLabels(ctx, days, width, pad, axisY) {
      ctx.fillStyle = "#768196";
      ctx.font = "10px Segoe UI";
      ctx.textAlign = "center";
      for (let day = 1; day <= days; day++) {
        const x = pad + (day - 1) * (width / days) + (width / days) / 2;
        ctx.fillText(String(day), x, axisY + 20);
      }
      ctx.textAlign = "left";
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, Math.abs(height) / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function openChartModal(canvas, title) {
      els.chartModalTitle.textContent = title;
      els.dayDetail.hidden = true;
      els.chartPreview.src = canvas.toDataURL("image/png");
      els.chartPreview.alt = `${title} 확대 그래프`;
      els.chartPreview.hidden = false;
      els.chartModal.hidden = false;
    }

    function openDayDetail(day) {
      const date = `${state.month}-${pad2(day)}`;
      const entries = state.entries
        .filter((entry) => entry.date === date)
        .sort((a, b) => b.amount - a.amount);
      const expenseTotal = entries.filter((entry) => entry.type === "expense").reduce((sum, entry) => sum + entry.amount, 0);
      const incomeTotal = entries.filter((entry) => entry.type === "income").reduce((sum, entry) => sum + entry.amount, 0);

      els.chartModalTitle.textContent = `${formatMonthLabel(state.month)} ${day}일 상세`;
      els.chartPreview.hidden = true;
      els.chartPreview.removeAttribute("src");
      els.dayDetail.hidden = false;
      els.dayDetail.innerHTML = entries.length
        ? `
          <div class="day-total">지출 ${formatWon(expenseTotal)} · 수입 ${formatWon(incomeTotal)}</div>
          ${renderDayPie(entries)}
          ${entries.map((entry) => renderEntryDetail(entry)).join("")}
        `
        : '<div class="empty">이 날짜에는 기록된 내역이 없습니다.</div>';
      els.dayDetail.querySelectorAll("[data-go-entry]").forEach((row) => {
        row.addEventListener("click", () => goToLedgerEntry(row.dataset.goEntry));
        row.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            goToLedgerEntry(row.dataset.goEntry);
          }
        });
      });
      els.chartModal.hidden = false;
    }

    function renderDayPie(entries) {
      const expenses = entries.filter((entry) => entry.type === "expense");
      const totals = groupByCategory(expenses);
      const rows = Object.entries(totals).filter(([, value]) => value > 0).sort((a, b) => b[1] - a[1]);
      const total = rows.reduce((sum, [, value]) => sum + value, 0);
      if (!total) return '<div class="day-chart-card"><div class="empty">지출 원 그래프가 없습니다.</div></div>';

      let angle = 0;
      const stops = rows.map(([name, value]) => {
        const category = getCategory(name);
        const start = angle;
        angle += value / total * 360;
        return `${category.color} ${start}deg ${angle}deg`;
      }).join(", ");

      return `
        <div class="day-chart-card">
          <div class="day-pie" style="background: conic-gradient(${stops})" aria-label="일별 카테고리 원 그래프"></div>
          <div class="day-legend">
            ${rows.map(([name, value]) => {
              const category = getCategory(name);
              return `
                <div class="legend-row">
                  <span class="legend-name"><span class="legend-dot" style="background:${category.color}"></span>${category.icon} ${name}</span>
                  <span>${formatWon(value)}</span>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderEntryDetail(entry) {
      const category = getCategory(entry.category);
      return `
        <div class="entry detail-link" data-go-entry="${escapeHtml(String(entry.id))}" role="button" tabindex="0" title="최근 내역에서 보기">
          <div class="entry-icon" style="background:${category.color}">${category.icon}</div>
          <div class="entry-main">
            <div class="entry-title">
              <strong>${escapeHtml(entry.title)}</strong>
              <span class="badge">AI ${escapeHtml(entry.category)}</span>
            </div>
            <div class="entry-sub">${escapeHtml(entry.raw)}</div>
          </div>
          <div class="entry-amount ${entry.type === "income" ? "income" : ""}">${entry.type === "income" ? "+" : "-"}${formatWon(entry.amount)}</div>
        </div>
      `;
    }

    function goToLedgerEntry(entryId) {
      const entries = getMonthEntries();
      const index = entries.findIndex((entry) => String(entry.id) === String(entryId));
      if (index < 0) {
        showToast("최근 내역에서 항목을 찾지 못했습니다.");
        return;
      }
      state.ledgerPage = Math.floor(index / 10);
      closeChartModal();
      render();
      requestAnimationFrame(() => {
        const target = Array.from(els.ledgerBody.querySelectorAll("[data-entry-id]"))
          .find((row) => row.dataset.entryId === String(entryId));
        const section = document.getElementById("recentLedgerSection");
        (target || section)?.scrollIntoView({ behavior: "smooth", block: "center" });
        if (!target) return;
        target.classList.add("target-highlight");
        window.setTimeout(() => target.classList.remove("target-highlight"), 2200);
      });
    }

    function closeChartModal() {
      els.chartModal.hidden = true;
      els.chartPreview.removeAttribute("src");
      els.dayDetail.hidden = true;
    }

    function clearCanvas(ctx, canvas) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function groupByCategory(entries) {
      return entries.reduce((acc, entry) => {
        acc[entry.category] = (acc[entry.category] || 0) + entry.amount;
        return acc;
      }, {});
    }

    function groupByDay(entries) {
      return entries.reduce((acc, entry) => {
        const day = Number(entry.date.slice(-2));
        acc[day] = (acc[day] || 0) + entry.amount;
        return acc;
      }, {});
    }

    function getBudgetSource(currentIncome) {
      if (currentIncome > 0) {
        return { amount: currentIncome, kind: "current", month: state.month, label: `${formatWon(currentIncome)} 이번 달 수입 기준` };
      }
      const previous = getPreviousIncomeSource(state.month);
      if (previous) {
        return { amount: previous.amount, kind: "previous", month: previous.month, label: `${formatWon(previous.amount)} ${previous.month} 수입 이어받음` };
      }
      return { amount: 0, kind: "none", month: state.month, label: "수입을 입력하면 다음 달에도 자동 적용" };
    }

    function getPreviousIncomeSource(month) {
      const monthTotals = state.entries
        .filter((entry) => entry.type === "income" && entry.date.slice(0, 7) < month)
        .reduce((acc, entry) => {
          const entryMonth = entry.date.slice(0, 7);
          acc[entryMonth] = (acc[entryMonth] || 0) + entry.amount;
          return acc;
        }, {});
      const previousMonth = Object.keys(monthTotals).sort().reverse()[0];
      return previousMonth ? { month: previousMonth, amount: monthTotals[previousMonth] } : null;
    }

    function applyWeekdayHint(line, date) {
      const weekdays = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      const index = weekdays.findIndex((day) => line.includes(day));
      if (index === -1) return;
      const current = date.getDay();
      let diff = index - current;
      if (/지난주/.test(line)) diff -= 7;
      else if (!/이번주/.test(line) && diff > 0) diff -= 7;
      date.setDate(date.getDate() + diff);
    }

    function getMonthEntries() {
      return state.entries
        .filter((entry) => entry.date.startsWith(state.month))
        .sort((a, b) => b.date.localeCompare(a.date));
    }

    function exportCsv() {
      const rows = [["date", "title", "category", "type", "amount", "raw"], ...getMonthEntries().map((entry) => [
        entry.date, entry.title, entry.category, entry.type, entry.amount, entry.raw
      ])];
      const csv = rows.map((row) => row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `ai-budget-${state.month}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function exportText() {
      const entries = [...state.entries].sort((a, b) => a.date.localeCompare(b.date));
      const months = entries.reduce((acc, entry) => {
        const month = entry.date.slice(0, 7);
        if (!acc[month]) acc[month] = [];
        acc[month].push(entry);
        return acc;
      }, {});

      const lines = ["AI 가계부 전체 내역", `내보낸 날짜: ${toDateValue(new Date())}`, ""];
      Object.keys(months).sort().forEach((month) => {
        const monthEntries = months[month];
        const income = monthEntries.filter((entry) => entry.type === "income").reduce((sum, entry) => sum + entry.amount, 0);
        const expense = monthEntries.filter((entry) => entry.type === "expense").reduce((sum, entry) => sum + entry.amount, 0);
        lines.push(`[${month}]`);
        lines.push(`수입 ${formatWon(income)} / 지출 ${formatWon(expense)} / 잔액 ${formatSigned(income - expense)}`);
        monthEntries.forEach((entry) => {
          const sign = entry.type === "income" ? "+" : "-";
          lines.push(`${entry.date} | ${entry.category} | ${entry.title} | ${sign}${formatWon(entry.amount)} | ${entry.raw}`);
        });
        lines.push("");
      });

      if (!entries.length) lines.push("저장된 내역이 없습니다.");
      downloadFile(`ai-budget-all-${toDateValue(new Date())}.txt`, lines.join("\n"), "text/plain;charset=utf-8");
    }

    function exportJsonBackup() {
      const backup = {
        app: "ai-budget-book",
        version: 1,
        exportedAt: new Date().toISOString(),
        entries: state.entries
      };
      downloadFile(
        `ai-budget-backup-${toDateValue(new Date())}.json`,
        JSON.stringify(backup, null, 2),
        "application/json;charset=utf-8"
      );
      showToast(`${state.entries.length}건을 백업했습니다.`);
    }

    async function importJsonBackup(event) {
      const file = event.target.files && event.target.files[0];
      event.target.value = "";
      if (!file) return;

      try {
        const parsed = JSON.parse(await file.text().then((text) => text.replace(/^\uFEFF/, "")));
        const entries = Array.isArray(parsed) ? parsed : parsed && parsed.entries;
        if (!Array.isArray(entries)) throw new Error("invalid backup");

        const validEntries = entries.filter((entry) =>
          entry &&
          typeof entry.date === "string" &&
          typeof entry.amount === "number" &&
          (entry.type === "expense" || entry.type === "income")
        ).map((entry) => ({
          ...entry,
          id: entry.id || `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          title: entry.title || "불러온 내역",
          category: entry.category || "기타",
          raw: entry.raw || entry.title || "불러온 내역"
        }));

        if (!validEntries.length && entries.length) throw new Error("invalid entries");

        state.entries = normalizeLoadedEntries(mergeStoredEntries([...state.entries, ...validEntries]));
        state.ledgerPage = 0;
        persist();
        render();
        showToast(`${validEntries.length}건을 불러왔습니다.`);
      } catch {
        showToast("올바른 가계부 백업 JSON 파일이 아닙니다.");
      }
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob(["\ufeff" + content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function backupCurrentStorageBeforeClear() {
      const backup = mergeStoredEntries([
        ...state.entries,
        ...readStoredEntries(STORAGE_KEY),
        ...readStoredEntries(OLD_STORAGE_KEY),
        ...readStoredEntries(BACKUP_STORAGE_KEY)
      ]);
      if (backup.length) {
        localStorage.setItem(BACKUP_STORAGE_KEY, JSON.stringify(backup));
      }
    }

    function restoreSavedEntries() {
      const restored = mergeStoredEntries([
        ...readStoredEntries(BACKUP_STORAGE_KEY),
        ...readStoredEntries(OLD_STORAGE_KEY),
        ...readStoredEntries(STORAGE_KEY),
        ...state.entries
      ]);
      if (!restored.length) {
        showToast("복구할 저장 내역을 찾지 못했습니다.");
        return;
      }
      state.entries = normalizeLoadedEntries(restored);
      state.ledgerPage = 0;
      persist();
      render();
      showToast(`${state.entries.length}건을 복구했습니다.`);
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
    }

    function loadEntries() {
      const current = readStoredEntries(STORAGE_KEY);
      const legacy = readStoredEntries(OLD_STORAGE_KEY);
      const merged = mergeStoredEntries([...legacy, ...current]);
      if (legacy.length || merged.length !== current.length) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
      }
      return merged;
    }

    function readStoredEntries(key) {
      try {
        const value = JSON.parse(localStorage.getItem(key) || "[]");
        return Array.isArray(value) ? value : [];
      } catch {
        return [];
      }
    }

    function mergeStoredEntries(entries) {
      const seen = new Set();
      return entries
        .filter((entry) => {
          if (!entry || !entry.date || entry.amount === undefined || entry.amount === null) return false;
          const key = entry.id || [
            entry.date,
            entry.title || "",
            entry.category || "",
            entry.type || "",
            entry.amount,
            entry.raw || ""
          ].join("|");
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => String(b.date).localeCompare(String(a.date)));
    }

    function normalizeLoadedEntries(entries) {
      let changed = false;
      const normalized = entries.map((entry) => {
        if (entry.type === "income") return { ...entry, category: "수입" };
        const guessed = inferCategory(`${entry.raw || ""} ${entry.title || ""}`);
        if ((entry.auto || !entry.category || entry.category === "기타") && guessed !== entry.category) {
          changed = true;
          return { ...entry, category: guessed, auto: true };
        }
        return entry;
      });
      if (changed) localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
      return normalized;
    }

    function seedIfEmpty() {
      if (state.entries.length) return;
      const samples = ["오늘 점심 한식뷔페 12000원", "어제 커피 5500원", "그제 지하철 1550원", "5/25 월급 250만원"];
      state.entries = samples.map(parseLine).filter(Boolean);
      persist();
    }

    function shiftMonth(delta) {
      const [year, month] = state.month.split("-").map(Number);
      const date = new Date(year, month - 1 + delta, 1);
      state.month = toMonthValue(date);
      state.ledgerPage = 0;
      els.monthFilter.value = state.month;
      render();
    }

    function getCategory(name) {
      return categories.find((category) => category.name === name) || categories[categories.length - 1];
    }

    function formatWon(value) {
      return `${Math.round(value).toLocaleString("ko-KR")}원`;
    }

    function shortWon(value) {
      if (Math.abs(value) >= 10000) return `${Math.round(value / 10000).toLocaleString("ko-KR")}만`;
      return value.toLocaleString("ko-KR");
    }

    function formatSigned(value) {
      const sign = value > 0 ? "+" : value < 0 ? "-" : "";
      return `${sign}${formatWon(Math.abs(value))}`;
    }

    function formatMonthLabel(monthValue) {
      const month = Number(monthValue.slice(5, 7));
      return `${month}월`;
    }

    function toDateValue(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    function toMonthValue(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}`;
    }

    function daysInMonth(monthValue) {
      const [year, month] = monthValue.split("-").map(Number);
      return new Date(year, month, 0).getDate();
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    let toastTimer;
    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {
          console.warn("서비스 워커를 등록하지 못했습니다.");
        });
      });
    }
  </script>
</body>
</html>
